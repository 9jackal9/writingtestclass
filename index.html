                <div class="passage-box">기나긴 겨울잠에서 깨어난 대지 위로 봄비가 내린다. 톡톡 창문을 두드리는 봄비는 내 얼굴을 부드럽게 쓰다듬는 엄마의 손길이다. 꽁꽁 얼어붙었던 흙을 녹이고, 바싹 메마른 나뭇가지마다 초록빛 생명을 훅 하고 불어넣는 마술사이다. 이 비가 그치고 나면 온 세상은 다시 다채로운 색깔로 물들며 기지개를 켤 것이다.</div>
                <div class="q-text">Q. 위 시에서 ‘봄비’를 표현하기 위해 사용된 비유적 표현(원관념과 보조관념)을 찾고, 이러한 표현을 사용했을 때의 효과를 서술하시오.</div>

                </div>
                <div class="answer-space"></div>
            </div>

            <div class="question-block">
                <div class="q-title">[문제 2] [소설] 인물의 갈등 유형 분석</div>
                <div class="passage-box">지훈이는 책상에 앉아 스마트폰과 수학 문제집을 번갈아 보며 깊은 한숨을 쉬었다. '아, 내일이 수학 수행평가인데… 진짜 딱 10분만 게임을 하고 할까? 아니야, 저번 중간고사 때도 그러다가 결국 밤을 꼴딱 새우고 시험을 망쳤잖아. 그래도 지금 머리가 너무 아픈데 한 판만 하면 집중이 더 잘 되지 않을까?' 지훈이의 머릿속은 게임의 유혹과 공부를 해야 한다는 책임감이라는 두 가지 생각으로 복잡하게 얽혀 도무지 결론이 나지 않았다.</div>
                <div class="q-text">Q. 제시글에 나타난 지훈이의 갈등 유형을 밝히고, 갈등이 발생하는 원인을 서술하시오.</div>
                <div class="condition-box">
                    <span class="condition-title">&lt;작성 조건&gt;</span>
                    <ul><li>갈등의 유형(내적 갈등, 외적 갈등)을 정확히 명시할 것.</li><li>원인을 '무엇'과 '무엇' 사이의 고민인지 구체적으로 밝힐 것.</li><li>맞춤법에 맞게 완성된 문장으로 표현할 것. (끝은 '~때문이다.'로 맺을 것)</li></ul>
                </div>
                <div class="answer-space"></div>
            </div>

            <div class="question-block">
                <div class="q-title">[문제 3] [설명문] 중심 내용 요약하기</div>
                <div class="passage-box">우리가 흔히 진흙밭이라고 생각하기 쉬운 갯벌은 사실 우리에게 상상 이상으로 많은 것을 내어주는 소중한 공간이다. 첫째, 갯벌은 수많은 조개, 게, 낙지 등 다양한 해양 생물들이 안전하게 살아가는 거대한 서식지 역할을 한다. 둘째, 갯벌은 육지에서 흘러나온 각종 오염 물질들을 그물처럼 걸러내어 바다를 깨끗하게 정화해 주는 자연의 필터 역할을 한다. 셋째, 갯벌은 푹신한 스펀지처럼 물을 흡수하여 홍수나 태풍 같은 거대한 자연재해로부터 육지의 피해를 획기적으로 줄여주는 든든한 방파제 역할도 수행한다.</div>
                <div class="q-text">Q. 제시글을 읽고, 글쓴이가 말하고자 하는 갯벌의 가치(역할)를 요약하시오.</div>

            <div class="question-block">
                <div class="q-title">[문제 4] [논설문] 근거의 타당성 평가</div>
                <div class="passage-box">최근 우리 학교 쓰레기통을 보면 일회용 플라스틱 컵이 넘쳐나고 있다. 우리는 교내에서 일회용 플라스틱 컵 사용을 전면 금지해야 한다. 플라스틱은 자연 상태에서 썩는 데 수백 년 이상이 걸려 생태계를 심각하게 파괴하기 때문이다. 우리가 매일 무심코 버리는 컵 하나가 훗날 거대한 환경 재앙으로 돌아올 수 있다. <u>게다가 플라스틱 컵을 안 쓰면 우리 학교 축구부의 주말 리그 성적도 훌쩍 올라갈 것이다.</u> 따라서 텀블러 사용을 생활화해야 한다.</div>
                <div class="q-text">Q. 제시글의 밑줄 친 문장이 주장을 뒷받침하는 근거로 타당한지 판단하고, 그 이유를 서술하시오.</div>
                <div class="condition-box">

                </div>
                <div class="answer-space"></div>
            </div>

                <div class="q-text">Q. 제시글의 (가)와 (나)에 쓰인 밑줄 친 단어의 품사를 각각 쓰고, 둘의 품사가 다름을 구별할 수 있는 문법적 이유를 서술하시오.</div>

                <div class="q-title">[문제 6] [문법] 어휘의 의미 관계 파악</div>
                <div class="passage-box">단어들은 서로 홀로 존재하지 않고 일정한 의미 관계를 맺으며 무리를 이룬다. 예를 들어, 오늘 날씨가 ㉠ '<u class='underline decoration-gray-500'>춥다</u>'와 내일 날씨가 '<u class='underline decoration-gray-500'>덥다</u>'처럼 서로 반대되는 뜻을 가진 단어들이 있다. 한편, 우리가 자주 먹는 간식 중 ㉡ '<u class='underline decoration-gray-500'>과일</u>'이라는 큰 범주 안에는 '<u class='underline decoration-gray-500'>딸기</u>', '사과', '포도'처럼 그 범주에 포함되는 단어들이 존재한다. 이러한 단어들의 관계를 정확히 이해하면 어휘력을 크게 향상시킬 수 있다.</div>
                <div class="q-text">Q. 수진이의 말하기 방식이 지닌 문제점을 지적하고, 이를 '공감적 듣기(반영하기)'의 방법이 드러나도록 고쳐 쓰시오.</div>

        let currentIndex = 0;
        const userAnswers = new Array(quizData.length).fill("");

        function renderMenu() {
            const menuList = document.getElementById('menuList');
            menuList.innerHTML = quizData.map((quiz, index) => `
                <button onclick="changeTabTo(${index})" class="w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${index === currentIndex ? 'bg-blue-100 text-blue-800 font-bold' : 'text-gray-600 hover:bg-gray-100'}">
                    ${index + 1}. ${quiz.title.split(']')[1].replace('[', '')}
                </button>
            `).join('');
        }

        function renderContent(index) {
            const data = quizData[index];
            const contentArea = document.getElementById('contentArea');
            
            let conditionHTML = data.conditions.map(cond => `<li class="ml-4 mb-1 list-disc text-sm text-gray-700">${cond}</li>`).join('');
            
            // 문제 3번일 경우 글자 수 카운터 추가
            let charCounterHTML = index === 2 
                ? `<div id="charCounter" class="text-right text-xs mt-1 font-bold text-gray-500">(현재 글자 수: ${userAnswers[index].length}자 / 30자)</div>` 
                : '';

            contentArea.innerHTML = `
                <div class="fade-in max-w-3xl mx-auto">
                    <h2 class="text-2xl font-bold text-gray-900 mb-4">${data.title}</h2>
                    
                    <div class="bg-gray-100 p-5 rounded-lg border border-gray-300 mb-6 text-gray-800 leading-relaxed text-sm shadow-inner">
                        ${data.passage}
                    </div>
                    
                    <div class="mb-4">
                        <p class="font-bold text-lg text-blue-900 mb-2">${data.question}</p>
                    </div>
                    
                    <div class="bg-blue-50 border border-blue-200 p-4 rounded-lg mb-6">
                        <p class="font-bold text-blue-800 mb-2 text-sm">&lt;작성 조건&gt;</p>
                        <ul class="list-inside">${conditionHTML}</ul>
                    </div>
                    
                    <div class="mb-8">
                        <label class="block font-bold text-gray-700 mb-2">학생 답안 작성란 (연습용)</label>
                        <textarea id="studentAnswer" class="w-full h-32 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none text-sm" placeholder="여기에 조건을 맞추어 답안을 작성해 보세요." oninput="saveAnswer(${index}, this.value)">${userAnswers[index]}</textarea>
                        ${charCounterHTML}
                    </div>
                    
                    <div class="flex gap-3 mb-6">
                        <button onclick="toggleSection('guide')" class="px-4 py-2 bg-yellow-100 text-yellow-800 rounded-lg hover:bg-yellow-200 transition text-sm font-bold shadow-sm">💡 풀이 가이드 보기</button>
                        <button onclick="toggleSection('answer')" class="px-4 py-2 bg-green-100 text-green-800 rounded-lg hover:bg-green-200 transition text-sm font-bold shadow-sm">✅ 모범 답안 보기</button>
                    </div>
                    
                    <div id="guide" class="hidden bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg mb-4 text-sm leading-relaxed text-gray-800">
                        <p class="font-bold mb-1 text-yellow-800">선생님의 꼼꼼한 풀이 가이드</p>
                        ${data.guide}
                    </div>
                    
                    <div id="answer" class="hidden bg-green-50 border-l-4 border-green-500 p-4 rounded-r-lg text-sm leading-relaxed font-bold text-gray-900">
                        <p class="font-bold mb-1 text-green-800 text-xs">모범 답안</p>
                        ${data.answer}
                    </div>
                </div>
            `;
            updateNavigation();
        }

        function saveAnswer(index, value) {
            userAnswers[index] = value;
            if (index === 2) { // 3번 요약 문제의 글자 수 카운팅
                const counter = document.getElementById('charCounter');
                const len = value.length;
                counter.textContent = `(현재 글자 수: ${len}자 / 30자)`;
                if (len > 30) {
                    counter.classList.replace('text-gray-500', 'text-red-600');
                } else {
                    counter.classList.replace('text-red-600', 'text-gray-500');
                }
            }
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
            el.classList.add('fade-in');
        }

        function changeTab(offset) {
            const newIndex = currentIndex + offset;
            if (newIndex >= 0 && newIndex < quizData.length) {
                currentIndex = newIndex;
                renderMenu();
                renderContent(currentIndex);
            }
        }

        function changeTabTo(index) {
            currentIndex = index;
            renderMenu();
            renderContent(currentIndex);
        }

        function updateNavigation() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === quizData.length - 1;
            document.getElementById('pageIndicator').textContent = `${currentIndex + 1} / ${quizData.length}`;
        }

        // B4 학습지 생성 및 다운로드 함수
        function downloadWorksheet() {
            // template 태그 안의 순수한 HTML 문자열을 가져옴
            const templateContent = document.getElementById('worksheetTemplate').innerHTML;
            
            // HTML 파일로 저장하기 위해 Blob 객체 생성
            const blob = new Blob([templateContent], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            // 가상 링크를 만들어 다운로드 트리거
            const a = document.createElement('a');
            a.href = url;
            a.download = '학생용_서논술형_학습지_B4.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 초기화
        window.onload = () => {
            renderMenu();
            renderContent(0);
        };
    </script>
</body>
